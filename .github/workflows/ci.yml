name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        run: |
          cp .env.dist .env
          printf 'USER_ID=%s\nGROUP_ID=%s\n' "$(id -u)" "$(id -g)" >> .env

      - name: Lint Docker Compose
        run: docker compose config > /dev/null

      - name: Lint Makefile
        run: make -n help

  # Frontend gate: until now the frontend had NO CI coverage — only the e2e job
  # touched it via `npm run dev` (Vite, no typecheck). A broken production build
  # (`tsc -b`) and failing Vitest units both slipped through. This job closes
  # that gap: typecheck + production build + unit tests on every PR.
  frontend:
    name: Frontend (build + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build (tsc -b + vite)
        working-directory: frontend
        run: npm run build

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npx vitest run

  # A18: blocking dependency-vulnerability audits, deliberately isolated in their OWN
  # job (no `needs`, and NOT a dependency of build-docker). A newly-disclosed advisory
  # against an unchanged package therefore reds only THIS check — which requires human
  # triage (bump the dep, or explicitly ignore the advisory) — without gating the image
  # build or the functional jobs on a commit that changed nothing.
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        run: |
          cp .env.dist .env
          printf 'USER_ID=%s\nGROUP_ID=%s\n' "$(id -u)" "$(id -g)" >> .env

      # PHP — reads composer.lock, no vendor install needed. --abandoned=ignore: an
      # abandoned package is not a vulnerability (Composer 2.7+ would fail on it by default).
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
      - name: Composer audit
        working-directory: backend
        run: composer audit --locked --no-interaction --abandoned=ignore

      # Node — reads package-lock, no install needed. All deps are scanned (a runtime lib
      # misfiled under devDependencies still ships to browsers), gated at high+ so an
      # unfixable low/moderate advisory doesn't block every unrelated PR.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

      # Python — audit the ENGINE IMAGE's actual installed versions (what ships), not a
      # fresh unpinned resolve. `pip freeze` omits pip/setuptools tooling by default, and
      # auditing the frozen list via an isolated pipx-run pip-audit means the tool never
      # perturbs (upgrades) the set it is meant to check. The local non-PyPI package is stripped.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: pip-audit
        run: |
          docker compose build engine
          docker compose run --rm --no-deps engine pip freeze | grep -vE '^(-e |clubscheduler-engine)' > engine-deps.txt
          pipx run pip-audit --requirement engine-deps.txt

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        run: |
          cp .env.dist .env
          printf 'USER_ID=%s\nGROUP_ID=%s\n' "$(id -u)" "$(id -g)" >> .env

      - name: Start services
        run: docker compose up -d --wait php-fpm postgres redis

      - name: Install PHP deps
        run: docker compose exec -T php-fpm composer install --no-interaction

      - name: Run PHPStan
        run: docker compose exec -T php-fpm composer phpstan

  blocking-tests:
    name: Blocking Tests
    runs-on: ubuntu-latest
    needs: [lint, phpstan]
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        run: |
          cp .env.dist .env
          printf 'USER_ID=%s\nGROUP_ID=%s\n' "$(id -u)" "$(id -g)" >> .env

      - name: Start services
        run: docker compose up -d --wait php-fpm engine

      - name: Install PHP deps
        run: docker compose exec -T php-fpm composer install --no-interaction

      - name: Generate JWT keys
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php bin/console lexik:jwt:generate-keypair --skip-if-exists --no-interaction'

      - name: Init test database
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php bin/console doctrine:database:create --if-not-exists --connection admin --env=test && php bin/console doctrine:migrations:migrate --no-interaction --env=test'

      - name: TenantIsolationTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/TenantIsolationTest.php --group phase1'

      - name: SeasonIsolationTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/SeasonIsolationTest.php --group phase1'

      - name: SeasonReadonlyTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/SeasonReadonlyTest.php --group phase1'

      - name: MatchTenantIsolationTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/MatchTenantIsolationTest.php --group phase1'

      - name: TenantCacheIsolationTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/TenantCacheIsolationTest.php --group phase1'

      - name: ConcurrentGenerationTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Queue/ConcurrentGenerationTest.php --group phase1'

      - name: ContractSchemaTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/CrossStack/ContractSchemaTest.php --group phase1'

      - name: RlsIsolationTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/RlsIsolationTest.php --group phase1'

      - name: ClubUserAccessTests
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/ClubAccessTest.php tests/Security/UserSelfOnlyTest.php tests/Security/ImportAuthorizationTest.php --group phase1'

      - name: MercureHardeningTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/MercureHardeningTest.php --group phase1'

      - name: ManagementRoleTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/ManagementRoleTest.php --group phase1'

      - name: ApiRateLimitTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/ApiRateLimitTest.php --group phase1'

      - name: SuperAdminAccessTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/SuperAdminAccessTest.php --group phase1'

      - name: EngagedTeamGuardTest
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/Security/EngagedTeamGuardTest.php --group phase1'

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: blocking-tests
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        run: |
          cp .env.dist .env
          printf 'USER_ID=%s\nGROUP_ID=%s\n' "$(id -u)" "$(id -g)" >> .env

      - name: Start services
        run: docker compose up -d --wait php-fpm engine

      - name: Install PHP deps
        run: docker compose exec -T php-fpm composer install --no-interaction

      - name: Generate JWT keys
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php bin/console lexik:jwt:generate-keypair --skip-if-exists --no-interaction'

      - name: Init test database
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php bin/console doctrine:database:create --if-not-exists --connection admin --env=test && php bin/console doctrine:migrations:migrate --no-interaction --env=test'

      - name: Run unit tests
        run: docker compose exec -T -e APP_ENV=test php-fpm sh -c 'cd /app/backend && php vendor/bin/phpunit tests/'

  engine-tests:
    name: Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        run: |
          cp .env.dist .env
          printf 'USER_ID=%s\nGROUP_ID=%s\n' "$(id -u)" "$(id -g)" >> .env

      - name: Build engine
        run: docker compose build engine

      - name: Run pytest
        run: docker compose run --rm engine pytest

      - name: Run ruff
        run: docker compose run --rm engine ruff check .

      - name: Run mypy
        run: docker compose run --rm engine mypy

  engine-perf:
    name: Engine Perf Gate
    runs-on: ubuntu-latest
    # Perf gate is main-only. It guards the MVP "< 3 min" exit criterion and,
    # since the multi-worker fix, ratchets the large tier (dense + BCCL) to a
    # 60s budget so a regression to the single-worker prove-stall (612s) fails.
    if: github.ref == 'refs/heads/main'
    needs: engine-tests
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        run: |
          cp .env.dist .env
          printf 'USER_ID=%s\nGROUP_ID=%s\n' "$(id -u)" "$(id -g)" >> .env

      - name: Build engine
        run: docker compose build engine

      - name: Run perf gate
        run: docker compose run --rm engine pytest -m perf

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: blocking-tests
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        run: |
          cp .env.dist .env
          printf 'USER_ID=%s\nGROUP_ID=%s\n' "$(id -u)" "$(id -g)" >> .env

      # The journey drives the real stack: nginx (/api), engine (solve),
      # mercure, redis, postgres. messenger-worker starts AFTER composer
      # install — its `bin/console messenger:consume` command dies without
      # vendor/ on a fresh checkout and `--wait` would fail the job.
      - name: Start services
        run: docker compose up -d --wait php-fpm nginx engine mercure redis postgres

      - name: Install PHP deps
        run: docker compose exec -T php-fpm composer install --no-interaction

      - name: Generate JWT keys
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php bin/console lexik:jwt:generate-keypair --skip-if-exists --no-interaction'

      - name: Migrate dev database
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php bin/console doctrine:migrations:migrate --no-interaction'

      # matches.spec logs in as the BasketballInit-seeded club — append-load the
      # dev fixtures (idempotent, existing rows are reused, never purged).
      # BasketballInit REFUSES the app_user connection (RLS silently breaks the
      # purge — see the guard in BasketballInit::load): inject the admin URL, like
      # `make fixtures` (reads .env then .env.local, last wins), so the loader runs
      # as the superuser. Kept --append (never purge the seeded club) instead of
      # calling `make fixtures`, which reloads from scratch. Fail fast if the key
      # is missing — an empty DATABASE_URL suppresses the Dotenv fallback and would
      # abort with an opaque DSN error deep in the loader instead.
      - name: Load dev fixtures
        run: |
          docker compose exec -T php-fpm sh -c '
            cd /app/backend
            DBU=$(cat .env .env.local 2>/dev/null | sed -n "s/^DATABASE_ADMIN_URL=//p" | tail -n1 | tr -d "\"")
            [ -n "$DBU" ] || { echo "DATABASE_ADMIN_URL introuvable dans backend/.env — fixtures ne peuvent pas tourner sur la connexion admin"; exit 1; }
            DATABASE_URL="$DBU" php bin/console doctrine:fixtures:load --append --no-interaction
          '

      - name: Start messenger worker
        run: docker compose up -d --wait messenger-worker

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start Vite dev server
        working-directory: frontend
        run: |
          npm run dev &
          for i in $(seq 1 60); do
            curl -sf http://localhost:5173 >/dev/null && exit 0
            sleep 1
          done
          echo "Vite dev server did not come up" && exit 1

      - name: Run Playwright suite
        working-directory: frontend
        run: E2E_BASE_URL=http://localhost:5173 npx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [blocking-tests, engine-tests]
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        run: |
          cp .env.dist .env
          printf 'USER_ID=%s\nGROUP_ID=%s\n' "$(id -u)" "$(id -g)" >> .env

      - name: Build all images
        run: docker compose build
