name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Docker Compose
        run: docker compose config > /dev/null

      - name: Lint Makefile
        run: make -n help

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --wait php-fpm postgres redis

      - name: Install PHP deps
        run: docker compose exec -T php-fpm composer install --no-interaction

      - name: Run PHPStan
        run: docker compose exec -T php-fpm composer phpstan

  blocking-tests:
    name: Blocking Tests
    runs-on: ubuntu-latest
    needs: [lint, phpstan]
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --wait

      - name: Install PHP deps
        run: docker compose exec -T php-fpm composer install --no-interaction

      - name: TenantIsolationTest
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php vendor/bin/.phpunit/phpunit-9.6-0/phpunit tests/Security/TenantIsolationTest.php --group phase1'

      - name: TenantCacheIsolationTest
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php vendor/bin/.phpunit/phpunit-9.6-0/phpunit tests/Security/TenantCacheIsolationTest.php --group phase1'

      - name: ConcurrentGenerationTest
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php vendor/bin/.phpunit/phpunit-9.6-0/phpunit tests/Queue/ConcurrentGenerationTest.php --group phase1'

      - name: ContractSchemaTest
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php vendor/bin/.phpunit/phpunit-9.6-0/phpunit tests/CrossStack/ContractSchemaTest.php --group phase1'

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: blocking-tests
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --wait

      - name: Install PHP deps
        run: docker compose exec -T php-fpm composer install --no-interaction

      - name: Run unit tests
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php vendor/bin/.phpunit/phpunit-9.6-0/phpunit tests/'

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: blocking-tests
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --wait

      - name: Install PHP deps
        run: docker compose exec -T php-fpm composer install --no-interaction

      - name: Run functional tests
        run: docker compose exec -T php-fpm sh -c 'cd /app/backend && php vendor/bin/.phpunit/phpunit-9.6-0/phpunit tests/ --filter Functional'

  engine-tests:
    name: Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build engine
        run: docker compose build engine

      - name: Run pytest
        run: docker compose run --rm engine pytest

      - name: Run ruff
        run: docker compose run --rm engine ruff check .

      - name: Run mypy
        run: docker compose run --rm engine mypy

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [blocking-tests, engine-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build
