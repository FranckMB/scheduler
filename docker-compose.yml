services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: clubscheduler-frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8081}:80"
    depends_on:
      nginx:
        condition: service_healthy
      mercure:
        condition: service_healthy
      engine:
        condition: service_healthy
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - clubscheduler_network

  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${USER_ID:-1000}
        GID: ${GROUP_ID:-1000}
    container_name: clubscheduler-php-fpm
    working_dir: /app/backend
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    volumes:
      - ./:/app:cached
    env_file:
      - ./.env
    environment:
      # Browser-facing hub URL must match the actually published port
      # (${MERCURE_PORT}); overrides the static value in backend/.env so the two
      # can never drift.
      MERCURE_PUBLIC_URL: "http://localhost:${MERCURE_PORT}/.well-known/mercure"
    expose:
      - "9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mercure:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - clubscheduler_network

  nginx:
    image: nginx:1.27-alpine
    container_name: clubscheduler-nginx
    depends_on:
      php-fpm:
        condition: service_healthy
    ports:
      - "127.0.0.1:${NGINX_PORT}:80"
    volumes:
      - ./:/app:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clubscheduler_network

  postgres:
    image: postgres:16-alpine
    container_name: clubscheduler-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - clubscheduler_network

  redis:
    image: redis:7-alpine
    container_name: clubscheduler-redis
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - clubscheduler_network

  messenger-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${USER_ID:-1000}
        GID: ${GROUP_ID:-1000}
    container_name: clubscheduler-messenger-worker
    working_dir: /app/backend
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    volumes:
      - ./:/app:cached
    env_file:
      - ./.env
    command: >-
      sh -lc 'if [ -f bin/console ]; then
        exec php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M --no-interaction;
      else
        exec sleep infinity;
      fi'
    depends_on:
      php-fpm:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$cmd = @file_get_contents(\"/proc/1/cmdline\"); exit((strpos($$cmd, \"messenger:consume\") === false && strpos($$cmd, \"sleep\") === false) ? 1 : 0);'"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - clubscheduler_network

  # Hourly maintenance loop. All three commands are idempotent so hourly is
  # safe: periods:remind dedupes per (entry, threshold) via period_reminder_log,
  # seasons:remind-transition dedupes per (season, threshold) via
  # transition_reminder_log, and reconcile-stuck only touches GENERATING
  # schedules older than --older-than.
  cron-runner:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${USER_ID:-1000}
        GID: ${GROUP_ID:-1000}
    container_name: clubscheduler-cron-runner
    working_dir: /app/backend
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    volumes:
      - ./:/app:cached
    env_file:
      - ./.env
    command: >-
      sh -lc 'while true; do
        if [ -f bin/console ]; then
          php bin/console app:periods:remind --no-interaction || true;
          php bin/console app:seasons:remind-transition --no-interaction || true;
          php bin/console app:schedules:reconcile-stuck --older-than=60 --no-interaction || true;
          php bin/console app:users:purge-unverified --no-interaction || true;
          php bin/console app:clubs:purge-erased --no-interaction || true;
          php bin/console app:users:purge-inactive --no-interaction || true;
          php bin/console app:seasons:purge --no-interaction || true;
        fi;
        sleep 3600;
      done'
    depends_on:
      php-fpm:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      # Same PID-1 pattern as messenger-worker (no pgrep in the php image; a
      # process-list grep would also self-match). PID 1 is the sh loop whose
      # command line carries "sleep 3600".
      test: ["CMD-SHELL", "php -r '$$cmd = @file_get_contents(\"/proc/1/cmdline\"); exit(strpos($$cmd, \"sleep 3600\") === false ? 1 : 0);'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - clubscheduler_network

  engine:
    build:
      context: .
      dockerfile: docker/engine/Dockerfile
    container_name: clubscheduler-engine
    working_dir: /app/engine
    volumes:
      - ./:/app:cached
    env_file:
      - ./engine/.env
      - ./.env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:${ENGINE_PORT}:8000"
    command: >-
      sh -lc 'if [ -f app/main.py ]; then exec uvicorn app.main:app --host 0.0.0.0 --port 8000; else exec python -m http.server 8000 --bind 0.0.0.0; fi'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - clubscheduler_network

  pdf-worker:
    build:
      context: .
      dockerfile: docker/pdf-worker/Dockerfile
    container_name: clubscheduler-pdf-worker
    working_dir: /app/frontend
    volumes:
      - ./:/app:cached
      - pdf_worker_node_modules:/app/frontend/node_modules
    environment:
      NODE_ENV: development
      PUPPETEER_SKIP_DOWNLOAD: "true"
      NODE_PATH: /app/frontend/node_modules
    command: [ "node", "worker.js" ]
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -fa 'node worker.js' >/dev/null" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - clubscheduler_network

  mercure:
    image: dunglas/mercure:latest
    container_name: clubscheduler-mercure
    environment:
      SERVER_NAME: ":80"
      # SEC-05/06: dedicated Mercure secret (no longer the lexik JWT passphrase);
      # no anonymous subscribers, CORS limited to the dev frontends, publish
      # restricted to same-origin (the backend publishes server-side).
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:5173 http://localhost:8081
    ports:
      - "127.0.0.1:${MERCURE_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - clubscheduler_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: clubscheduler-mailpit
    ports:
      - "127.0.0.1:${MAILPIT_SMTP_PORT}:1025"
      - "127.0.0.1:${MAILPIT_WEB_PORT}:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8025/ >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - clubscheduler_network

networks:
  clubscheduler_network:
    name: clubscheduler_network

volumes:
  postgres_data:
  pdf_worker_node_modules:
