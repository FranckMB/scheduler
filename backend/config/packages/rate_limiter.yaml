framework:
    rate_limiter:
        # Anti-brute-force / anti-ARA-enumeration on public auth endpoints.
        auth_register:
            policy: 'sliding_window'
            limit: 5
            interval: '15 minutes'
        auth_password_forgot:
            policy: 'sliding_window'
            limit: 5
            interval: '15 minutes'

# Dev/e2e: the Playwright suite registers ~8 clubs in one minute from one IP —
# the anti-brute-force sizing (5/15min) is a production concern, not a local
# one. Prod keeps the strict limits above (no when@prod override needed).
when@dev:
    framework:
        rate_limiter:
            auth_register:
                policy: 'sliding_window'
                limit: 1000
                interval: '15 minutes'
