framework:
    rate_limiter:
        # Anti-brute-force / anti-ARA-enumeration on public auth endpoints.
        auth_register:
            policy: 'sliding_window'
            limit: 5
            interval: '15 minutes'
        auth_password_forgot:
            policy: 'sliding_window'
            limit: 5
            interval: '15 minutes'
        # Per-IP bound on the email-verification consume endpoint (anti token brute-force).
        auth_register_verify:
            policy: 'sliding_window'
            limit: 10
            interval: '15 minutes'
        # SEC-11: global throttle on the authenticated API, keyed PER USER (JWT),
        # applied by ApiRateLimitSubscriber on ^/api. 300/min = 5 req/s — well
        # above legitimate use (the frontend polls a schedule every few seconds)
        # but a real bound on a runaway/abusive client. Public endpoints keep
        # their own per-IP limiters above (this one needs an authenticated user).
        api:
            policy: 'sliding_window'
            limit: 300
            interval: '1 minute'
        # RGPD portabilité : l'export club lit 19 tables et encode plusieurs Mo
        # par appel — l'usage légitime est ponctuel (quelques exports par an).
        # 10/h par utilisateur = large pour l'usage réel, borne réelle contre
        # un JWT management qui pomperait le workspace en boucle.
        rgpd_export:
            policy: 'sliding_window'
            limit: 10
            interval: '1 hour'

# Dev/e2e: the Playwright suite registers ~8 clubs in one minute from one IP —
# the strict anti-brute-force sizing (5/15min) is a production concern. 100 is
# enough for repeated local/CI suite runs while still being a REAL bound: an
# APP_ENV=dev box accidentally exposed (the .env.dist default) is not an open
# door for mass tenant creation / ARA enumeration. Prod keeps 5/15min.
when@dev:
    framework:
        rate_limiter:
            auth_register:
                policy: 'sliding_window'
                limit: 100
                interval: '15 minutes'
            auth_register_verify:
                policy: 'sliding_window'
                limit: 100
                interval: '15 minutes'

# Test: a small API bound so ApiRateLimitTest can trip the 429 in a handful of
# requests. Keyed per user, so it never leaks across the other functional tests
# (each registers its own user, none makes 30 authed requests as one user).
when@test:
    framework:
        rate_limiter:
            api:
                policy: 'sliding_window'
                limit: 30
                interval: '1 minute'
