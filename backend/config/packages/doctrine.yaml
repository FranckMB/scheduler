doctrine:
    dbal:
        default_connection: default
        connections:
            # Runtime connection — RLS-restricted app_user. All ORM traffic.
            default:
                url: '%env(resolve:DATABASE_URL)%'
                profiling_collect_backtrace: '%kernel.debug%'
                use_savepoints: true
            # Admin connection — clubscheduler (superuser, bypasses RLS).
            # Used ONLY by migrations, database create/drop and ops/debug
            # (--connection admin). This is the superadmin supervision door.
            admin:
                url: '%env(resolve:DATABASE_ADMIN_URL)%'
                profiling_collect_backtrace: '%kernel.debug%'
                use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
        controller_resolver:
            auto_mapping: false
        filters:
            tenant_filter:
                class: App\Doctrine\Filter\TenantFilter
                enabled: false
            season_filter:
                class: App\Doctrine\Filter\SeasonFilter
                enabled: false

when@test:
    doctrine:
        dbal:
            connections:
                default:
                    dbname_suffix: ''
                    profiling_collect_backtrace: false
                admin:
                    dbname_suffix: ''
                    profiling_collect_backtrace: false

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
