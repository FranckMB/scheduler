# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Where club logos are stored. Dev/default = local disk (persisted via the
    # ./:/app mount). Prod: swap the LogoStorage alias below for object storage.
    app.logo_storage_dir: '%kernel.project_dir%/var/storage/logos'
    # FFBB Meilisearch bearer token (lot C). Optional override — empty by default,
    # in which case FfbbApiClient fetches the public token from the FFBB config
    # endpoint at runtime. Never hard-code a token in the repo.
    env(FFBB_MEILISEARCH_TOKEN): ''

services:
    App\AdminJob\AdminJobExecutorInterface: '@App\AdminJob\ConsoleAdminJobExecutor'

    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            # Browser-facing origin for links emailed to users (e.g. the email-verification
            # link). Empty → callers fall back to the request host (dev/e2e single origin).
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'
            # Optional FFBB Meilisearch token override (lot C); empty → fetched at runtime.
            $ffbbMeilisearchToken: '%env(FFBB_MEILISEARCH_TOKEN)%'
            $appSecret: '%env(APP_SECRET)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Service/DevScheduleReportWriter.php'
            - '../src/Export/ScheduleExportData.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Logo storage: local disk in dev. Prod swaps this alias for an object-storage
    # implementation (S3/GCS/…) — callers depend only on the LogoStorage interface.
    App\Storage\LocalLogoStorage:
        arguments:
            $dir: '%app.logo_storage_dir%'
    App\Storage\LogoStorage: '@App\Storage\LocalLogoStorage'

    App\EventListener\TenantFilterListener:
        tags:
            - { name: kernel.event_subscriber }

    App\EventListener\CacheInvalidationListener:
        arguments:
            $tenantCachePool: '@cache.tenant'
            $scheduleCachePool: '@cache.schedule'
