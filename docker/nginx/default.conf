upstream php_fpm {
    server php-fpm:9000;
}

server {
    listen 80;
    server_name _;
    root /app/backend/public;
    index index.php;
    client_max_body_size 20m;

    # Security headers on API/exports responses (A17). No CSP here — the API is
    # JSON/PDF (CSP is a no-op) and a strict one would break the API Platform
    # docs UI; nosniff is the header that actually matters for JSON. No location
    # in this server sets its own add_header, so these inherit everywhere.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location = /api/health {
        default_type application/json;
        return 200 '{"status":"ok","service":"nginx"}';
    }

    location /.well-known/mercure {
        proxy_pass http://mercure/.well-known/mercure;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
    }

    location /api/ {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_pass php_fpm;
        fastcgi_read_timeout 60s;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }
}
