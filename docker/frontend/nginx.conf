server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;

    server_tokens off;
    # Security headers are included per content-location (HTML shell + static),
    # NOT at server level, so the /api, /engine and /exports proxy locations
    # don't inherit the SPA's CSP onto backend responses.

    location = /health {
        include /etc/nginx/snippets/security-headers.conf;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 "healthy\n";
    }

    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        include /etc/nginx/snippets/csp.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location ~* \.(?:css|js|mjs|png|jpe?g|gif|svg|ico|webp|avif|woff2?)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location /.well-known/mercure {
        include /etc/nginx/snippets/security-headers.conf;
        set $mercure_upstream http://mercure:80;
        proxy_pass $mercure_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
    }

    location /api/ {
        set $api_upstream http://nginx:80;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Exported PDF/PNG files served from the backend's public/exports.
    location /exports/ {
        set $exports_upstream http://nginx:80;
        proxy_pass $exports_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /engine/ {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass http://engine:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # SPA shell: always revalidate so a redeploy's new asset hashes are picked
        # up (the exact `= /index.html` block above doesn't cover the try_files fallback).
        include /etc/nginx/snippets/security-headers.conf;
        include /etc/nginx/snippets/csp.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }
}
