# Security response headers for the SPA (A17). Kept in a snippet and `include`d
# in the server block AND in every location that defines its own add_header —
# nginx does NOT inherit server-level add_header into a location that has any
# add_header of its own, so without re-including here the HTML shell (which sets
# Cache-Control) would ship with NO security headers.
#
# CSP tuned to the Vite build: the app loads one external module script
# (script-src 'self'), an external stylesheet plus React inline style attributes
# (style-src 'self' 'unsafe-inline'), same-origin XHR to /api, /engine and
# /.well-known/mercure (connect-src 'self'), and same-origin images + data:/blob:
# URIs (blob: is the logo-cropper preview, LogoCropper.tsx / ClubPage.tsx).
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
