# Baseline security headers, safe on EVERY response (HTML, JSON proxy, SSE, text).
# `include`d wherever nginx would otherwise drop them — the SPA content locations
# (which also add the CSP, see csp.conf) AND the proxy/util locations that set
# their own add_header or proxy to an upstream that sets none (/engine, /health,
# mercure). nginx does NOT inherit server-level add_header into a location that
# has any add_header of its own, so these must be re-included per location.
#
# Referrer-Policy stays "same-origin" (no Referer leaves the origin at all) and
# HSTS omits includeSubDomains (TLS is terminated upstream; pinning sibling
# subdomains to HTTPS for a year is a deployment footgun).
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "same-origin" always;
add_header Strict-Transport-Security "max-age=31536000" always;
