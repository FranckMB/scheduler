# Content-Security-Policy for the SPA HTML + assets ONLY (included alongside the
# baseline in the content locations). Kept off the /api, /engine and /exports
# proxy locations so a strict default-src can't break API/engine responses.
#
# Tuned to the Vite build: one external module script (script-src 'self'), an
# external stylesheet + React inline style attributes (style-src 'self'
# 'unsafe-inline'), same-origin XHR to /api, /engine, /.well-known/mercure plus
# blob: (connect-src — ClubPage recrop fetch()es the logo object URL), and
# same-origin images with data:/blob: (logo cropper preview, palette extraction).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
